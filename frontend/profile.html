<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile · Career Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<style>
  h2.font-display, .section-title { font-family: var(--font-display); }
</style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
  <div class="brand-mark"><span class="dot"></span> CareerPath</div>
  <div class="nav-links">
    <a href="profile.html" class="active">Profile</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
  <button class="logout-btn" id="logoutBtn">Log Out</button>
</div>

    <div class="profile-container">
      <div class="alert" id="alertBox"></div>

      <div class="profile-card reveal">
        <div class="profile-header">
          <div class="avatar" id="avatar">?</div>
          <div>
            <h3 id="userName">Loading...</h3>
            <p id="userEmail"></p>
          </div>
        </div>
        <input type="file" id="pictureInput" accept=".jpg,.jpeg,.png,.webp" style="display:none" />
        <button class="btn-secondary" id="changePicBtn" style="max-width:220px;">Change Profile Picture</button>
      </div>

      <div class="profile-card reveal">
        <h4 class="section-title">Personal Information</h4>
        <form id="profileForm">
          <div class="field">
            <label for="name">Full name</label>
            <input type="text" id="name" required />
          </div>
           <div class="field">
  <label for="goal">Career field</label>
  <select id="goal" name="goal" style="width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font-body); background:var(--purple-50);">
    <option value="">Select a field</option>
    <option value="Web Development">Web Development</option>
    <option value="AI & Machine Learning">AI & Machine Learning</option>
    <option value="Data Science">Data Science</option>
    <option value="Cyber Security">Cyber Security</option>
    <option value="Cloud & DevOps">Cloud & DevOps</option>
    <option value="Mobile App Development">Mobile App Development</option>
    <option value="Software Engineering">Software Engineering</option>
    <option value="UI/UX Design">UI/UX Design</option>
    <option value="Graphic Design">Graphic Design</option>
    <option value="Digital Marketing">Digital Marketing</option>
    <option value="Game Development">Game Development</option>
  </select>
</div>
          <div class="field">
            <label for="interests">Interests / Skills</label>
            <input type="text" id="interests" placeholder="e.g. Python, UI Design, Public Speaking" />
          </div>
          <button type="submit" class="btn-primary" style="max-width:200px;">Save Changes</button>
        </form>
      </div>

      <div class="profile-card reveal">
        <h4 class="section-title">Privacy</h4>
        <div class="toggle-row">
          <div>
            <div class="label">Public profile</div>
            <div class="desc">Allow your name and career goal to be visible to other users.</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="privacyToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="profile-card reveal">
        <h4 class="section-title">Security</h4>
        <form id="passwordForm">
          <div class="field">
            <label for="currentPassword">Current password</label>
            <input type="password" id="currentPassword" required />
          </div>
          <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" required />
            <div class="strength-meter" id="strengthBars">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
          <button type="submit" class="btn-secondary" style="max-width:200px;">Change Password</button>
        </form>
      </div>
         <div class="profile-card reveal" style="border: 1.5px solid #FCEAEF;">
  <p class="section-title" style="color: #D6395B;">Danger zone</p>
  <p style="font-size:14px; color: var(--text-muted); margin:0 0 16px;">
    Deleting your account is permanent. All your data will be removed.
  </p>
  <button class="btn-primary" id="deleteBtn"
    style="background:#D6395B; max-width:200px;"
    onclick="document.getElementById('deleteModal').style.display='flex'">
    Delete my account
  </button>
</div>
<!-- Confirmation modal -->
<div id="deleteModal" style="display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.4); align-items:center; justify-content:center; z-index:999;">
  <div style="background:#fff; border-radius:12px; padding:32px; max-width:380px; width:90%;">
    <h3 style="margin:0 0 8px; font-family:var(--font-display);">Are you sure?</h3>
    <p style="font-size:14px; color:var(--text-muted);">Enter your password to confirm deletion.</p>
    <div class="alert" id="deleteAlert"></div>
    <div class="field">
      <input type="password" id="deletePassword" placeholder="Your current password" />
    </div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn-secondary" onclick="document.getElementById('deleteModal').style.display='none'">
        Cancel
      </button>
      <button class="btn-primary" style="background:#D6395B;" onclick="confirmDelete()">
        Yes, delete
      </button>
    </div>
  </div>
</div> 
    </div>
 
  </div>

<script src="js/api.js"></script>
<script>
  // Scroll-triggered reveal animation using IntersectionObserver
const revealObserver = new IntersectionObserver(
  (entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("in-view");
        revealObserver.unobserve(entry.target);
      }
    });
  },
  { threshold: 0.15 }
);
document.querySelectorAll(".reveal").forEach((el) => revealObserver.observe(el));
async function loadProfile() {
  const result = await apiGet("/profile");
  if (!result.success) {
    window.location.href = "index.html";
    return;
  }
  const u = result.user;
  document.getElementById("userName").textContent = u.name;
  document.getElementById("userEmail").textContent = u.email;
  document.getElementById("name").value = u.name || "";
  document.getElementById("goal").value = u.goal || "";
  document.getElementById("interests").value = u.interests || "";
  document.getElementById("privacyToggle").checked = !!u.privacy_public;

  const avatar = document.getElementById("avatar");
  if (u.profile_picture) {
    avatar.innerHTML = `<img src="${u.profile_picture}" alt="profile picture" />`;
  } else {
    avatar.textContent = (u.name || "?").charAt(0).toUpperCase();
  }
}

document.getElementById("profileForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideAlert("alertBox");
  const payload = {
    name: document.getElementById("name").value.trim(),
    goal: document.getElementById("goal").value.trim(),
    interests: document.getElementById("interests").value.trim(),
    privacyPublic: document.getElementById("privacyToggle").checked,
  };
  const result = await apiPut("/profile", payload);
  showAlert("alertBox", result.message, result.success ? "success" : "error");
  if (result.success) loadProfile();
});

document.getElementById("privacyToggle").addEventListener("change", async (e) => {
  await apiPut("/profile", { privacyPublic: e.target.checked });
});

document.getElementById("newPassword").addEventListener("input", (e) => {
  renderStrength("strengthBars", "strengthLabel", e.target.value);
});

document.getElementById("passwordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideAlert("alertBox");
  const currentPassword = document.getElementById("currentPassword").value;
  const newPassword = document.getElementById("newPassword").value;
  const result = await apiPost("/change-password", { currentPassword, newPassword });
  showAlert("alertBox", result.message, result.success ? "success" : "error");
  if (result.success) document.getElementById("passwordForm").reset();
});

document.getElementById("changePicBtn").addEventListener("click", () => {
  document.getElementById("pictureInput").click();
});

document.getElementById("pictureInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append("profilePicture", file);
  const result = await apiPost("/profile/picture", formData, true);
  showAlert("alertBox", result.message, result.success ? "success" : "error");
  if (result.success) loadProfile();
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await apiPost("/logout", {});
  window.location.href = "index.html";
});
async function confirmDelete() {
  const password = document.getElementById("deletePassword").value;
  if (!password) return;
  const res = await fetch("/api/auth/delete-account", {
    method: "DELETE",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = "index.html";
  } else {
    showAlert("deleteAlert", data.message, "error");
  }
}

loadProfile();
</script>
</body>
</html>
