<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password · Career Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="mobile-topbar"><span class="dot"></span> CareerPath</div>
    <div class="auth-side">
      <div class="brand-mark"><span class="dot"></span> CareerPath</div>
      <h1>Forgot your password? No problem.</h1>
      <p class="tagline">We'll email you a secure link that expires in 15 minutes to keep your account safe.</p>
    </div>

    <div class="auth-form-side">
      <div class="auth-card">
        <h2>Reset your password</h2>
        <p class="sub">Enter your email and we'll send you a reset link.</p>

        <div class="alert" id="alertBox"></div>

        <form id="forgotForm">
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
          <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
        </form>

        <p class="footer-link"><a href="index.html">Back to log in</a></p>
      </div>
    </div>
  </div>

<script src="js/api.js"></script>
<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideAlert("alertBox");
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Sending...";

  const email = document.getElementById("email").value.trim();
  const result = await apiPost("/forgot-password", { email });

  btn.disabled = false; btn.textContent = "Send Reset Link";
  showAlert("alertBox", result.message, result.success ? "success" : "error");
});
</script>
</body>
</html>
