<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password · Career Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
      <div class="mobile-topbar"><span class="dot"></span> CareerPath</div>
    <div class="auth-side">
      <div class="brand-mark"><span class="dot"></span> CareerPath</div>
      <h1>Set a new password.</h1>
      <p class="tagline">Choose a strong password you haven't used before.</p>
    </div>

    <div class="auth-form-side">
      <div class="auth-card">
        <h2>Create new password</h2>
        <p class="sub">This link is valid for 15 minutes only.</p>

        <div class="alert" id="alertBox"></div>

        <form id="resetForm">
          <div class="field">
            <label for="password">New password</label>
            <div class="password-wrap">
              <input type="password" id="password" placeholder="New password" required />
              <span class="toggle-eye" onclick="togglePwd('password')">SHOW</span>
            </div>
            <div class="strength-meter" id="strengthBars">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <div class="password-wrap">
              <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
              <span class="toggle-eye" onclick="togglePwd('confirmPassword')">SHOW</span>
            </div>
            <div class="error-text" id="matchError">Passwords do not match</div>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
        </form>

        <p class="footer-link"><a href="index.html">Back to log in</a></p>
      </div>
    </div>
  </div>

<script src="js/api.js"></script>
<script>
function togglePwd(id) {
  const input = document.getElementById(id);
  const eye = input.parentElement.querySelector(".toggle-eye");
  if (input.type === "password") { input.type = "text"; eye.textContent = "HIDE"; }
  else { input.type = "password"; eye.textContent = "SHOW"; }
}

document.getElementById("password").addEventListener("input", (e) => {
  renderStrength("strengthBars", "strengthLabel", e.target.value);
});

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideAlert("alertBox");

  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  document.getElementById("matchError").style.display = "none";

  if (password !== confirmPassword) {
    document.getElementById("matchError").style.display = "block";
    return;
  }

  const token = getQueryParam("token");
  if (!token) {
    showAlert("alertBox", "Reset token missing from link. Please use the link from your email.", "error");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Resetting...";

  const result = await apiPost("/reset-password", { token, password });

  btn.disabled = false; btn.textContent = "Reset Password";
  showAlert("alertBox", result.message, result.success ? "success" : "error");

  if (result.success) {
    setTimeout(() => (window.location.href = "index.html"), 1200);
  }
});
</script>
</body>
</html>
